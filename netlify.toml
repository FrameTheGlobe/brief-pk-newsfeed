[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'Building...'"

# Enable nft (Node File Trace) which is usually better for dynamic requires
[functions]
  node_bundler = "nft"

# Redirects map /api calls to their corresponding Netlify Functions
[[redirects]]
  from = "/api/feeds"
  to = "/.netlify/functions/feeds"
  status = 200

[[redirects]]
  from = "/api/market"
  to = "/.netlify/functions/market"
  status = 200

# Security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Explicit headers for API endpoints
[[headers]]
  for = "/api/feeds"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "s-maxage=300, stale-while-revalidate=60"

[[headers]]
  for = "/api/market"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "s-maxage=300, stale-while-revalidate=60"
