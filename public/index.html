<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="brief.pk — Pakistan Newsfeed. Live aggregator covering politics, economy, geopolitics, foreign policy, security and society.">
  <meta name="theme-color" content="#1B3A4B">
  <title>brief. | Pakistan Newsfeed</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="apple-touch-icon" href="/img/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Nastaliq+Urdu:wght@400;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>

<!-- ═══════════════════════════════════════════════
     HEADER
═══════════════════════════════════════════════ -->

<header class="site-header" id="siteHeader">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <a href="/" class="logo">
      <img src="/img/brief_logo.png" alt="brief.pk" class="logo-img">
    </a>
    <div class="header-divider"></div>
    <div class="lang-switcher" id="headerLangSwitcher">
      <button class="lang-btn" data-lang="all">All</button>
      <button class="lang-btn active" data-lang="en">English</button>
      <button class="lang-btn" data-lang="ur">اردو</button>
    </div>
  </div>

  <div class="header-center">
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span>LIVE</span>
    </div>
    <span class="stat-pill" id="headerStatCount">—</span>
    <span class="stat-label">stories</span>
    <span class="stat-sep">·</span>
    <span class="stat-pill" id="headerStatSources">—</span>
    <span class="stat-label">sources</span>
  </div>

  <div class="header-right">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search Pakistan news…" autocomplete="off">
      <button class="search-clear" id="searchClear" style="display:none" aria-label="Clear">✕</button>
    </div>

    <button class="btn-refresh" id="refreshBtn">
      <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      <span>Refresh</span>
    </button>
  </div>
</header>

<!-- ═══════════════════════════════════════════════
     BREAKING TICKER
═══════════════════════════════════════════════ -->
<div class="ticker-bar" id="tickerBar">
  <div class="ticker-badge">LATEST</div>
  <div class="ticker-viewport">
    <div class="ticker-track" id="tickerTrack">
      <span class="ticker-placeholder">Fetching Pakistan news — please wait…</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     APP SHELL  (sidebar + main + right panel)
═══════════════════════════════════════════════ -->
<div class="app-shell" id="appShell">

  <!-- ─── LEFT SIDEBAR ─────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">

      <div class="nav-section">
        <div class="nav-section-label">Browse</div>
        <ul class="nav-list" id="catNavList">
          <!-- Injected by JS -->
        </ul>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Sources</div>
        <ul class="sources-list" id="sourceNavList">
          <!-- Injected by JS -->
        </ul>
      </div>

    </nav>
  </aside>

  <!-- ─── MAIN CONTENT ──────────────────────────── -->
  <main class="main-content" id="mainContent">

    <!-- Dashboard Row 1: Hero + Live Feed -->
    <div class="dashboard-grid" id="dashboardRow1">
      
      <!-- Top stories / Hero -->
      <section class="dg-hero panel-block hero-dashboard-card" id="heroSection">
        <div class="panel-header">
          <span class="live-dot sm" style="background:var(--red)"></span>
          <span class="panel-title" id="lblHeroTitle">Top Stories</span>
          <span class="section-updated" id="heroUpdated" style="margin-left:auto; font-size:10px; color:var(--text-3)"></span>
        </div>
        <div class="hero-grid-wrapper">
          <div class="hero-grid" id="heroGrid">
            <!-- Skeleton -->
            <div class="hero-main skel-card">
              <div class="skel skel-img-hero"></div>
              <div class="skel-body">
                <div class="skel-tag-group" style="display:flex;gap:4px;margin-bottom:8px">
                  <div class="skel skel-tag"></div>
                  <div class="skel skel-tag"></div>
                </div>
                <div class="skel skel-h1"></div>
                <div class="skel skel-h2"></div>
              </div>
            </div>
            <div class="hero-side">
              <div class="skel-card side-card"><div class="skel skel-img-side"></div><div class="skel-body"><div class="skel skel-tag"></div><div class="skel skel-h1" style="width:90%"></div></div></div>
              <div class="skel-card side-card"><div class="skel skel-img-side"></div><div class="skel-body"><div class="skel skel-tag"></div><div class="skel skel-h1" style="width:85%"></div></div></div>
              <div class="skel-card side-card"><div class="skel skel-img-side"></div><div class="skel-body"><div class="skel skel-tag"></div><div class="skel skel-h1" style="width:95%"></div></div></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Live feed Widget -->
      <div class="dg-live panel-block" id="liveWidget">
        <div class="panel-header">
          <span class="live-dot sm"></span>
          <span class="panel-title">Live Updates</span>
        </div>
        <ul class="live-feed-list" id="liveFeedList">
          <li class="feed-item-skel"><div class="skel" style="height:12px;width:80%;margin-bottom:4px"></div><div class="skel" style="height:10px;width:50%"></div></li>
          <li class="feed-item-skel"><div class="skel" style="height:12px;width:90%;margin-bottom:4px"></div><div class="skel" style="height:10px;width:40%"></div></li>
          <li class="feed-item-skel"><div class="skel" style="height:12px;width:75%;margin-bottom:4px"></div><div class="skel" style="height:10px;width:55%"></div></li>
          <li class="feed-item-skel"><div class="skel" style="height:12px;width:85%;margin-bottom:4px"></div><div class="skel" style="height:10px;width:45%"></div></li>
          <li class="feed-item-skel"><div class="skel" style="height:12px;width:70%;margin-bottom:4px"></div><div class="skel" style="height:10px;width:50%"></div></li>
        </ul>
      </div>

    </div>

    <!-- Dashboard Row 2: Intellectual Widgets -->
    <div class="dashboard-grid" id="dashboardRow2">

      <!-- Market Hub Widget -->
      <div class="dg-markets panel-block market-hub">
        <div class="panel-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span class="panel-title">Economic Indicators</span>
        </div>
        <div class="market-widget" id="marketWidget">
          <div class="skel" style="height:115px; width:100%"></div>
        </div>
      </div>

      <!-- Conflict Watch Widget -->
      <div class="dg-conflict panel-block conflict-watch">
        <div class="panel-header conflict-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span class="panel-title">Af-Pak Conflict Watch</span>
        </div>
        <div class="conflict-tabs">
          <button class="conflict-tab active" data-target="conflictReports">Latest Reports</button>
          <button class="conflict-tab" data-target="conflictSocial">Intel (X)</button>
        </div>
        <div class="conflict-content">
          <ul class="live-feed-list" id="conflictReports">
            <li class="feed-item-skel"><div class="skel" style="height:12px;width:80%;margin-bottom:4px"></div><div class="skel" style="height:10px;width:50%"></div></li>
            <li class="feed-item-skel"><div class="skel" style="height:12px;width:90%;margin-bottom:4px"></div><div class="skel" style="height:10px;width:40%"></div></li>
          </ul>
          <div id="conflictSocial" style="display:none">
            <div class="social-placeholder">
              <p>Loading Intelligence Feed...</p>
              <a class="twitter-timeline" data-height="400" data-theme="light" href="https://twitter.com/KhorasanDiary?ref_src=twsrc%5Etfw">Tweets by KhorasanDiary</a> 
              <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Dynamic category sections injected here -->
    <div id="categorySections"></div>

    <!-- Load more -->
    <div class="load-more-row" id="loadMoreRow" style="display:none">
      <button class="btn-load-more" id="loadMoreBtn" onclick="App.loadMoreSection()">
        Load more stories
      </button>
    </div>

  </main>

</div><!-- /app-shell -->

<!-- ═══════════════════════════════════════════════
     FOOTER
═══════════════════════════════════════════════ -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">brief<span class="logo-dot">.</span><span class="logo-pk">pk</span></div>
    <p class="footer-tagline">"Voice of Pakistan" — Independent Pakistan news aggregator</p>
    <p class="footer-sources" id="footerSourcesList"></p>
  </div>
</footer>

<!-- Scroll-to-top -->
<button class="fab" id="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>

<!-- App script -->
<script src="/js/app.js"></script>
</body>
</html>
